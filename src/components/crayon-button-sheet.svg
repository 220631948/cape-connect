<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- CRAYON BUTTON COMPONENT SHEET -->
  <rect width="1000" height="600" fill="#0A0A0F" />
  
  <defs>
    <filter id="defaultShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="4" dy="4" stdDeviation="5" flood-color="black" />
      <feDropShadow dx="-2" dy="-2" stdDeviation="3" flood-color="rgba(255,255,255,0.02)" />
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0" />
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComposite operator="out" in="SourceGraphic" in2="offsetblur" result="inverse" />
      <feFlood flood-color="black" flood-opacity="0.8" />
      <feComposite operator="in" in2="inverse" />
      <feComposite operator="over" in2="SourceGraphic" />
    </filter>
  </defs>

  <text x="40" y="60" font-family="sans-serif" font-size="24" font-weight="bold" fill="#F0F0F5">Crayon Button States</text>
  <text x="40" y="90" font-family="monospace" font-size="12" fill="#6B6B80">STITCH COMPONENT ARCHIVE · TALPH-FIX</text>

  <!-- COLUMN 1: DARK THEME -->
  <text x="40" y="140" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5B8DEF">DARK THEME (DEFAULT)</text>
  
  {/* State: Default */}
  <g transform="translate(40, 170)">
    <rect width="180" height="50" rx="8" fill="#12121A" filter="url(#defaultShadow)" />
    <path d="M5,5 Q50,2 175,5 T175,45 T5,45 Z" fill="none" stroke="#5B8DEF" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.6" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#F0F0F5" text-anchor="middle">DEFAULT</text>
  </g>

  {/* State: Hover */}
  <g transform="translate(40, 250)">
    <rect width="180" height="50" rx="8" fill="#1A1A26" filter="url(#defaultShadow)" stroke="#5B8DEF" stroke-width="1" />
    <path d="M5,5 Q50,2 175,5 T175,45 T5,45 Z" fill="none" stroke="#5B8DEF" stroke-width="2" stroke-dasharray="2 4" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">HOVER</text>
    <text x="165" y="15" font-size="12">✨</text>
  </g>

  {/* State: Active (Pressed) */}
  <g transform="translate(40, 330)">
    <rect width="180" height="50" rx="8" fill="#050508" filter="url(#innerShadow)" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#A0A0B8" text-anchor="middle">ACTIVE</text>
  </g>

  {/* State: Disabled */}
  <g transform="translate(40, 410)">
    <rect width="180" height="50" rx="8" fill="#12121A" opacity="0.4" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#6B6B80" text-anchor="middle">DISABLED</text>
  </g>

  <!-- COLUMN 2: LIGHT THEME -->
  <text x="300" y="140" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5B8DEF">LIGHT THEME (OVERRIDE)</text>
  
  {/* State: Default */}
  <g transform="translate(300, 170)">
    <rect width="180" height="50" rx="8" fill="#F0F0F5" filter="url(#defaultShadow)" />
    <path d="M5,5 Q50,2 175,5 T175,45 T5,45 Z" fill="none" stroke="#5B8DEF" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.6" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#12121A" text-anchor="middle">DEFAULT</text>
  </g>

  {/* State: Hover */}
  <g transform="translate(300, 250)">
    <rect width="180" height="50" rx="8" fill="#FFFFFF" filter="url(#defaultShadow)" stroke="#5B8DEF" stroke-width="1" />
    <path d="M5,5 Q50,2 175,5 T175,45 T5,45 Z" fill="none" stroke="#5B8DEF" stroke-width="2" stroke-dasharray="2 4" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#000000" text-anchor="middle">HOVER</text>
  </g>

  <!-- COLUMN 3: ACCENT VARIANTS -->
  <text x="560" y="140" font-family="sans-serif" font-size="16" font-weight="bold" fill="#5B8DEF">CRAYON ACCENTS</text>
  
  <g transform="translate(560, 170)">
    <rect width="180" height="50" rx="8" fill="#12121A" filter="url(#defaultShadow)" />
    <path d="M5,5 Q50,2 175,5 T175,45 T5,45 Z" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="2 4" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#F0F0F5" text-anchor="middle">CORAL (ALERT)</text>
  </g>

  <g transform="translate(560, 250)">
    <rect width="180" height="50" rx="8" fill="#12121A" filter="url(#defaultShadow)" />
    <path d="M5,5 Q50,2 175,5 T175,45 T5,45 Z" fill="none" stroke="#4ECDC4" stroke-width="1.5" stroke-dasharray="2 4" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#F0F0F5" text-anchor="middle">GREEN (LIVE)</text>
  </g>

  <g transform="translate(560, 330)">
    <rect width="180" height="50" rx="8" fill="#12121A" filter="url(#defaultShadow)" />
    <path d="M5,5 Q50,2 175,5 T175,45 T5,45 Z" fill="none" stroke="#FFB347" stroke-width="1.5" stroke-dasharray="2 4" />
    <text x="90" y="32" font-family="sans-serif" font-size="14" fill="#F0F0F5" text-anchor="middle">AMBER (CACHED)</text>
  </g>

  <!-- FOOTER MASCOT -->
  <text x="850" y="550" font-family="sans-serif" font-size="40">🐢</text>
  <text x="840" y="575" font-family="monospace" font-size="10" fill="#A3E635">TALPH-APPROVED</text>
</svg>

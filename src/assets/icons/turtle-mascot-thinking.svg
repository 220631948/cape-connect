<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>Turtle Mascot - Thinking Pose</title>
  <desc>A thoughtful turtle character with hand-on-chin pose, contemplating GIS data analysis.</desc>

  <defs>
    <filter id="turtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="shellGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#7dd3c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d9d7f;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="64" cy="95" rx="42" ry="12" fill="rgba(0,0,0,0.1)" filter="url(#turtleGlow)"/>

  <!-- Shell -->
  <ellipse cx="64" cy="52" rx="38" ry="42" fill="url(#shellGradient)" stroke="#1d6b5f" stroke-width="2"/>

  <!-- Shell pattern -->
  <g stroke="#1d6b5f" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="48" cy="35" r="5"/>
    <circle cx="64" cy="30" r="5"/>
    <circle cx="80" cy="35" r="5"/>
    <circle cx="40" cy="52" r="5"/>
    <circle cx="56" cy="52" r="5"/>
    <circle cx="72" cy="52" r="5"/>
    <circle cx="88" cy="52" r="5"/>
    <circle cx="48" cy="69" r="5"/>
    <circle cx="64" cy="74" r="5"/>
    <circle cx="80" cy="69" r="5"/>
  </g>

  <!-- Shell highlight -->
  <ellipse cx="48" cy="38" rx="12" ry="16" fill="rgba(255,255,255,0.3)" opacity="0.8"/>

  <!-- Head (tilted, thinking) -->
  <circle cx="64" cy="100" r="16" fill="#7dd3c0" stroke="#1d6b5f" stroke-width="2" transform="rotate(-15 64 100)"/>

  <!-- Eyes (contemplative, one squinted) -->
  <circle cx="58" cy="96" r="4" fill="#1d6b5f"/>
  <circle cx="59" cy="95" r="1.5" fill="white"/>
  <!-- Squinted eye -->
  <path d="M 68 98 L 74 98" stroke="#1d6b5f" stroke-width="3" stroke-linecap="round"/>

  <!-- Thinking expression (open mouth) -->
  <ellipse cx="64" cy="104" rx="3" ry="4" fill="#1d6b5f"/>

  <!-- Thinking bubble (doodle cloud) -->
  <g stroke="#1d6b5f" stroke-width="1.5" fill="rgba(125, 211, 192, 0.2)" opacity="0.8">
    <circle cx="88" cy="70" r="6"/>
    <circle cx="95" cy="65" r="5"/>
    <circle cx="100" cy="75" r="4"/>
    <path d="M 86 78 L 84 82 L 88 80 Z" fill="#1d6b5f"/>
  </g>

  <!-- Hand on chin (lifting arm) -->
  <g>
    <!-- Arm -->
    <path d="M 48 85 Q 35 78 30 72" stroke="#7dd3c0" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="28" cy="70" r="5" fill="#7dd3c0" stroke="#1d6b5f" stroke-width="1.5"/>
  </g>

  <!-- Front legs -->
  <ellipse cx="42" cy="78" rx="8" ry="14" fill="#7dd3c0" stroke="#1d6b5f" stroke-width="1.5" transform="rotate(-25 42 78)"/>
  <ellipse cx="86" cy="78" rx="8" ry="14" fill="#7dd3c0" stroke="#1d6b5f" stroke-width="1.5" transform="rotate(25 86 78)"/>

  <!-- Back legs -->
  <g opacity="0.7">
    <ellipse cx="35" cy="72" rx="6" ry="11" fill="#6bc0ad" stroke="#1d6b5f" stroke-width="1.5" transform="rotate(-45 35 72)"/>
    <ellipse cx="93" cy="72" rx="6" ry="11" fill="#6bc0ad" stroke="#1d6b5f" stroke-width="1.5" transform="rotate(45 93 72)"/>
  </g>

  <!-- Tail -->
  <path d="M 100 65 Q 115 60 118 50" stroke="#1d6b5f" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="117" cy="48" rx="4" ry="5" fill="#7dd3c0" stroke="#1d6b5f" stroke-width="1"/>
</svg>

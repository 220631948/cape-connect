<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Vessel-Dark: Neomorphic Cargo Ship -->
  <defs>
    <filter id="vesselShadowDark" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.6)" />
    </filter>
  </defs>
  
  {/* Hull */}
  <path d="M10,35 Q10,45 32,45 T54,35 L54,30 L10,30 Z" 
        fill="#12121A" filter="url(#vesselShadowDark)" stroke="#5B8DEF" stroke-width="1.5" stroke-linejoin="round" />
  
  {/* Superstructure */}
  <path d="M35,30 L35,20 Q35,18 38,18 L48,18 Q51,18 51,20 L51,30 Z" 
        fill="#12121A" filter="url(#vesselShadowDark)" stroke="#5B8DEF" stroke-width="1.5" stroke-linejoin="round" />
  
  {/* Windows/Bridge */}
  <rect x="38" y="22" width="10" height="4" rx="1" fill="#5B8DEF" opacity="0.6" />
  
  {/* Cargo Stacks (Crayon style dots) */}
  <circle cx="18" cy="27" r="3" fill="#A78BFA" opacity="0.8" />
  <circle cx="26" cy="27" r="3" fill="#4ECDC4" opacity="0.8" />
</svg>

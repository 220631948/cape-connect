<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Neomorphic Clay Turtle Mascot -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="4" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="turtleShell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B8DEF;stop-opacity:1" />
    </linearGradient>
  </defs>

  {/* Body/Shell */}
  <circle cx="100" cy="110" r="70" fill="url(#turtleShell)" filter="url(#shadow)" />

  {/* Hexagonal Pattern on Shell (Simplified) */}
  <path d="M100,50 L120,60 L120,80 L100,90 L80,80 L80,60 Z" fill="white" opacity="0.2" />
  <path d="M130,80 L150,90 L150,110 L130,120 L110,110 L110,90 Z" fill="white" opacity="0.1" />
  <path d="M70,80 L90,90 L90,110 L70,120 L50,110 L50,90 Z" fill="white" opacity="0.1" />

  {/* Head */}
  <circle cx="100" cy="45" r="30" fill="#4ECDC4" filter="url(#shadow)" />
  <circle cx="90" cy="40" r="4" fill="#12121A" />
  <circle cx="110" cy="40" r="4" fill="#12121A" />
  <path d="M90,55 Q100,65 110,55" fill="none" stroke="#12121A" stroke-width="2" stroke-linecap="round" />

  {/* Flippers */}
  <ellipse cx="35" cy="110" rx="25" ry="15" fill="#5B8DEF" transform="rotate(-30, 35, 110)" />
  <ellipse cx="165" cy="110" rx="25" ry="15" fill="#5B8DEF" transform="rotate(30, 165, 110)" />
  <ellipse cx="60" cy="170" rx="20" ry="12" fill="#5B8DEF" transform="rotate(20, 60, 170)" />
  <ellipse cx="140" cy="170" rx="20" ry="12" fill="#5B8DEF" transform="rotate(-20, 140, 170)" />
</svg>

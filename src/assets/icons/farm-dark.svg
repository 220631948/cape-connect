<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Farm-Dark: Neomorphic Barn -->
  <defs>
    <filter id="farmShadowDark" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.6)" />
    </filter>
  </defs>

  {/* Barn Body */}
  <path d="M12,52 L12,30 L32,15 L52,30 L52,52 Q52,54 50,54 L14,54 Q12,54 12,52 Z"
        fill="#12121A" filter="url(#farmShadowDark)" stroke="#A3E635" stroke-width="1.5" stroke-linejoin="round" />

  {/* Roof Detail */}
  <path d="M12,30 L32,15 L52,30" fill="none" stroke="#A3E635" stroke-width="3" stroke-linecap="round" />

  {/* Barn Door */}
  <rect x="26" y="40" width="12" height="14" rx="2" fill="#1A1A26" stroke="#A3E635" stroke-width="1" />

  {/* Field Rows (Crayon style) */}
  <path d="M15,58 Q32,62 49,58" fill="none" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 4" />
</svg>

<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- MIDNIGHT CRAYON DESIGN TOKENS (V2.1) -->
  <rect width="800" height="1200" fill="#0A0A0F" />

  <defs>
    <filter id="swatchShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="4" dy="4" stdDeviation="5" flood-color="black" />
      <feDropShadow dx="-2" dy="-2" stdDeviation="3" flood-color="rgba(255,255,255,0.02)" />
    </filter>
  </defs>

  <text x="40" y="60" font-family="sans-serif" font-size="32" font-weight="bold" fill="#F0F0F5">Midnight Crayon Tokens</text>
  <text x="40" y="90" font-family="monospace" font-size="14" fill="#6B6B80">SYSTEMATIC VISUAL TRUTH · v2.1</text>

  <!-- SECTION: COLOR PALETTE -->
  <text x="40" y="150" font-family="sans-serif" font-size="20" font-weight="bold" fill="#5B8DEF">01. COLOR PALETTE</text>

  {/* Row 1: Surfaces */}
  <g transform="translate(40, 180)">
    <rect width="100" height="100" rx="16" fill="#0A0A0F" stroke="#2A2A3A" stroke-width="2" filter="url(#swatchShadow)" />
    <text x="0" y="120" font-family="monospace" font-size="12" fill="#A0A0B8">BG-PRIMARY</text>
    <text x="0" y="135" font-family="monospace" font-size="10" fill="#6B6B80">#0A0A0F</text>
  </g>
  <g transform="translate(160, 180)">
    <rect width="100" height="100" rx="16" fill="#12121A" filter="url(#swatchShadow)" />
    <text x="0" y="120" font-family="monospace" font-size="12" fill="#A0A0B8">BG-SECONDARY</text>
    <text x="0" y="135" font-family="monospace" font-size="10" fill="#6B6B80">#12121A</text>
  </g>
  <g transform="translate(280, 180)">
    <rect width="100" height="100" rx="16" fill="#1A1A26" filter="url(#swatchShadow)" />
    <text x="0" y="120" font-family="monospace" font-size="12" fill="#A0A0B8">BG-TERTIARY</text>
    <text x="0" y="135" font-family="monospace" font-size="10" fill="#6B6B80">#1A1A26</text>
  </g>

  {/* Row 2: Accents */}
  <g transform="translate(40, 340)">
    <rect width="80" height="80" rx="12" fill="#5B8DEF" filter="url(#swatchShadow)" />
    <text x="0" y="100" font-family="monospace" font-size="12" fill="#A0A0B8">BLUE (PRIMARY)</text>
  </g>
  <g transform="translate(140, 340)">
    <rect width="80" height="80" rx="12" fill="#FF6B6B" filter="url(#swatchShadow)" />
    <text x="0" y="100" font-family="monospace" font-size="12" fill="#A0A0B8">CORAL (ALERT)</text>
  </g>
  <g transform="translate(240, 340)">
    <rect width="80" height="80" rx="12" fill="#4ECDC4" filter="url(#swatchShadow)" />
    <text x="0" y="100" font-family="monospace" font-size="12" fill="#A0A0B8">GREEN (LIVE)</text>
  </g>
  <g transform="translate(340, 340)">
    <rect width="80" height="80" rx="12" fill="#FFB347" filter="url(#swatchShadow)" />
    <text x="0" y="100" font-family="monospace" font-size="12" fill="#A0A0B8">AMBER (CACHED)</text>
  </g>
  <g transform="translate(440, 340)">
    <rect width="80" height="80" rx="12" fill="#A3E635" filter="url(#swatchShadow)" />
    <text x="0" y="100" font-family="monospace" font-size="12" fill="#A0A0B8">LIME (TURTLE)</text>
  </g>

  <!-- SECTION: TYPOGRAPHY -->
  <text x="40" y="500" font-family="sans-serif" font-size="20" font-weight="bold" fill="#5B8DEF">02. TYPOGRAPHY SCALE</text>
  <g transform="translate(40, 530)">
    <rect width="720" height="60" rx="12" fill="#12121A" filter="url(#swatchShadow)" />
    <text x="20" y="38" font-family="sans-serif" font-size="30" font-weight="bold" fill="#F0F0F5">Heading 1 - 30px Bold</text>
  </g>
  <g transform="translate(40, 605)">
    <rect width="720" height="50" rx="12" fill="#12121A" filter="url(#swatchShadow)" />
    <text x="20" y="32" font-family="sans-serif" font-size="20" font-weight="semibold" fill="#F0F0F5">Panel Title - 20px Semibold</text>
  </g>
  <g transform="translate(40, 670)">
    <rect width="720" height="40" rx="12" fill="#12121A" filter="url(#swatchShadow)" />
    <text x="20" y="26" font-family="monospace" font-size="14" fill="#A0A0B8">Coordinate Mono - 14px Regular</text>
  </g>

  <!-- SECTION: SPACING & RADIUS -->
  <text x="40" y="780" font-family="sans-serif" font-size="20" font-weight="bold" fill="#5B8DEF">03. SPACING &amp; RADII</text>
  <g transform="translate(40, 810)">
    <rect x="0" y="0" width="4" height="40" fill="#5B8DEF" />
    <text x="0" y="55" font-family="monospace" font-size="10" fill="#6B6B80">4px</text>
    <rect x="20" y="0" width="8" height="40" fill="#5B8DEF" />
    <text x="20" y="55" font-family="monospace" font-size="10" fill="#6B6B80">8px</text>
    <rect x="50" y="0" width="16" height="40" fill="#5B8DEF" />
    <text x="50" y="55" font-family="monospace" font-size="10" fill="#6B6B80">16px</text>
    <rect x="100" y="0" width="32" height="40" fill="#5B8DEF" />
    <text x="100" y="55" font-family="monospace" font-size="10" fill="#6B6B80">32px</text>
  </g>

  <g transform="translate(300, 810)">
    <rect width="60" height="60" rx="4" fill="#1A1A26" stroke="#5B8DEF" stroke-width="1" />
    <text x="0" y="75" font-family="monospace" font-size="10" fill="#6B6B80">Radius: 4px</text>
    <rect x="80" y="0" width="60" height="60" rx="12" fill="#1A1A26" stroke="#5B8DEF" stroke-width="1" />
    <text x="80" y="75" font-family="monospace" font-size="10" fill="#6B6B80">Radius: 12px</text>
    <rect x="160" y="0" width="60" height="60" rx="30" fill="#1A1A26" stroke="#5B8DEF" stroke-width="1" />
    <text x="160" y="75" font-family="monospace" font-size="10" fill="#6B6B80">Radius: Full</text>
  </g>

  <!-- FOOTER MASCOT -->
  <text x="650" y="1150" font-family="sans-serif" font-size="40">🐢</text>
  <text x="640" y="1175" font-family="monospace" font-size="10" fill="#A3E635">TALPH-APPROVED</text>
</svg>

# CapeTown GIS Hub — Python Backend Local Development
# Services: api + celery-worker + redis
# Usage: docker compose up -d

services:
  # FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capegis-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL:-https://localhost:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-postgres}
      # Database (async connection to local PostGIS)
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgis:5432/capegis
      # Redis (Celery broker + result backend)
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Cloudflare R2 (optional for local dev)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-capegis-rasters}
      # Security
      - ALLOWED_ORIGINS=http://localhost:3000,https://capegis.vercel.app
      # Observability
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./app:/app/app:ro
      - ./main.py:/app/main.py:ro
    depends_on:
      redis:
        condition: service_healthy
      postgis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Celery worker for background tasks
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capegis-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL:-https://localhost:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-postgres}
      # Database
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgis:5432/capegis
      # Redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Cloudflare R2
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-capegis-rasters}
      # ML
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Observability
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./app:/app/app:ro
      - ./main.py:/app/main.py:ro
    depends_on:
      redis:
        condition: service_healthy
      postgis:
        condition: service_healthy

  # Redis for Celery broker and result backend
  redis:
    image: redis:7-alpine
    container_name: capegis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostGIS for local development
  postgis:
    image: kartoza/postgis:17-3.5
    container_name: capegis-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: capegis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d capegis" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis_data:
  postgis_data:

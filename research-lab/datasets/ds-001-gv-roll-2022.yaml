id: ds-001
name: CoCT General Valuation Roll 2022
version: "2022"
source_url: https://odp.capetown.gov.za/datasets/general-valuation-roll-2022
source_type: bulk_csv
license:
  name: Open Government Licence (South Africa)
  url: https://odp.capetown.gov.za/pages/open-government-licence
  commercial_use: true
  research_use: true
  redistribution: true
crs: EPSG:4326
geometry_type: None
schema:
  columns:
    - name: Erf_Nr
      type: text
      pii: false
      description: Unique erf (cadastral parcel) identifier — join key to cadastral_parcels
    - name: Suburb
      type: text
      pii: false
      description: Official suburb name as used by CoCT
    - name: Zone_Code
      type: text
      pii: false
      description: Zoning classification code (IZS)
    - name: Market_Val
      type: float
      pii: false
      description: Assessed market value in South African Rand (ZAR)
    - name: Category_D
      type: text
      pii: false
      description: Valuation category description (e.g. Residential, Commercial)
    - name: Extent_Of
      type: float
      pii: false
      description: Land extent of the erf in square metres
    - name: Full_Names
      type: text
      pii: true
      description: |
        POPIA CRITICAL — registered owner full names.
        MUST be stripped at ingestion before any DB load (see docs/ETL_PIPELINE.md).
        Never persisted to production tables.
size_estimate:
  rows: ~830000
  bytes: ~50MB
  format: CSV
privacy_sensitivity: 4
popia_flag: true
popia_notes: >
  The Full_Names column contains registered owner names and constitutes personal
  information under POPIA Section 1. It MUST be dropped in memory during ETL
  (Phase 2 – PII Stripping) before any data reaches the database. The processed
  dataset stored in valuation_data contains no PII. Combining erf_nr with owner
  names from any external source would re-constitute PII — prohibited.
refresh_frequency: static
cache_ttl: "1 year"
bounding_box:
  west: 18.0
  south: -34.5
  east: 19.5
  north: -33.0
tags: [valuation, cadastral, property, popia, gv-roll]
notes: >
  GV Roll 2022 is the sole approved valuation source per CLAUDE.md Rule 8
  (Lightstone data is explicitly prohibited). Supplementary rolls may be published
  annually by CoCT. Re-run the ETL pipeline for each supplementary roll.
  See docs/ETL_PIPELINE.md for the full ingestion procedure including chunked
  processing (50,000 rows/chunk) and staging-table pattern.

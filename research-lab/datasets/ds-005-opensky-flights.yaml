id: ds-005
name: OpenSky Network ADS-B Flight Tracking — Cape Town Airspace
version: latest
source_url: https://opensky-network.org/api/states/all
source_type: api
license:
  name: CC BY 4.0 (non-commercial); separate commercial agreement required
  url: https://opensky-network.org/about/terms-of-use
  commercial_use: conditional
  research_use: true
  redistribution: conditional
crs: EPSG:4326
geometry_type: Point
schema:
  columns:
    - name: icao24
      type: text
      pii: false
      description: Unique ICAO 24-bit transponder address (hex string) identifying the aircraft
    - name: callsign
      type: text
      pii: false
      description: Flight callsign as broadcast by the aircraft (may be null)
    - name: latitude
      type: float
      pii: false
      description: WGS-84 latitude of the aircraft in decimal degrees
    - name: longitude
      type: float
      pii: false
      description: WGS-84 longitude of the aircraft in decimal degrees
    - name: baro_altitude
      type: float
      pii: false
      description: Barometric altitude in metres above sea level (null if on ground)
    - name: velocity
      type: float
      pii: false
      description: Ground speed in metres per second
    - name: true_track
      type: float
      pii: false
      description: Track angle in degrees clockwise from north
    - name: on_ground
      type: integer
      pii: false
      description: 1 if the aircraft is on the ground, 0 if airborne
    - name: time_position
      type: integer
      pii: false
      description: Unix timestamp of the last position update
size_estimate:
  rows: ~200
  bytes: ~50KB
  format: GeoJSON
privacy_sensitivity: 2
popia_flag: false
popia_notes: >
  ADS-B transponder data is publicly broadcast and contains no direct personal
  information. However, aircraft operators (particularly private/charter operators)
  may be identifiable via ICAO24 lookup — privacy_sensitivity rated 2.
  No POPIA annotation required as no natural persons' data is processed directly.
  Monitor: OQ-016 tracks the unresolved commercial licensing question for paid tenants.
refresh_frequency: real-time
cache_ttl: "30s"
bounding_box:
  west: 18.0
  south: -34.5
  east: 19.5
  north: -33.0
tags: [flights, adsb, opensky, aviation, real-time, phase-2]
notes: >
  Phase 2 feature — milestone M7 (see docs/architecture/SYSTEM_DESIGN.md).
  API endpoint: GET https://opensky-network.org/api/states/all?lamin=-34.5&lomin=18.0&lamax=-33.0&lomax=19.5
  Anonymous access is rate-limited. Authenticated access provides higher limits.
  CRITICAL (OQ-016): Routing paid production traffic through this API requires a
  separate commercial agreement with OpenSky Network. Do NOT enable for paid
  tenants until OQ-016 is resolved and legal sign-off obtained.
  Cache TTL: 30s (operational resilience only — not long-term archival).
  Mock fallback: public/mock/flights.geojson with representative Cape Town airspace state vectors.
  Source badge: [OpenSky · LIVE · real-time] or [OpenSky · CACHED · <timestamp>] or [OpenSky · MOCK].

id: ds-002
name: CoCT Integrated Zoning Scheme (IZS)
version: latest
source_url: https://odp-cctegis.opendata.arcgis.com/datasets/integrated-zoning-scheme
source_type: arcgis_rest
license:
  name: Open Government Licence (South Africa)
  url: https://odp.capetown.gov.za/pages/open-government-licence
  commercial_use: true
  research_use: true
  redistribution: true
crs: EPSG:4326
geometry_type: Polygon
schema:
  columns:
    - name: OBJECTID
      type: integer
      pii: false
      description: ArcGIS internal feature identifier
    - name: zone_code
      type: text
      pii: false
      description: IZS zone code (e.g. SR1, GR1, MX3, MU) used as join key to GV Roll
    - name: zone_description
      type: text
      pii: false
      description: Human-readable zone description (e.g. Single Residential 1)
    - name: zone_category
      type: text
      pii: false
      description: Broad zoning category (Residential, Commercial, Industrial, etc.)
    - name: geometry
      type: geometry
      pii: false
      description: Polygon boundary of the zoning area in EPSG:4326
size_estimate:
  rows: ~45000
  bytes: ~80MB
  format: GeoJSON
privacy_sensitivity: 1
popia_flag: false
refresh_frequency: monthly
cache_ttl: "30 days"
bounding_box:
  west: 18.0
  south: -34.5
  east: 19.5
  north: -33.0
tags: [zoning, izs, planning, spatial, polygon]
notes: >
  Served via the CoCT ArcGIS Open Data portal as a FeatureService.
  Updates are published after by-law amendments; check the portal for
  PUBLISHED_DATE changes before refreshing the cache.
  Rendered as a semi-transparent overlay above cadastral parcels in the
  MapLibre layer stack (Z-order: zoning > cadastral > suburbs > basemap).
  Tile cache TTL in api_cache: 30 days (see docs/DATA_LIFECYCLE.md §2).

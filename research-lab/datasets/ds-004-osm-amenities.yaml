id: ds-004
name: OpenStreetMap Amenities — Cape Town Metro
version: latest
source_url: https://overpass-api.de/api/interpreter
source_type: overpass_api
license:
  name: ODbL 1.0 (Open Database Licence)
  url: https://opendatacommons.org/licenses/odbl/1-0/
  commercial_use: true
  research_use: true
  redistribution: conditional
crs: EPSG:4326
geometry_type: Point
schema:
  columns:
    - name: osm_id
      type: integer
      pii: false
      description: OpenStreetMap node/way/relation ID
    - name: amenity
      type: text
      pii: false
      description: OSM amenity tag value (e.g. school, hospital, restaurant, parking)
    - name: name
      type: text
      pii: false
      description: Common name of the amenity as tagged in OSM
    - name: opening_hours
      type: text
      pii: false
      description: OSM opening_hours string (may be null if not tagged)
    - name: geometry
      type: geometry
      pii: false
      description: Point location (centroid for ways/relations) in EPSG:4326
size_estimate:
  rows: ~85000
  bytes: ~12MB
  format: GeoJSON
privacy_sensitivity: 1
popia_flag: false
refresh_frequency: weekly
cache_ttl: "24h"
bounding_box:
  west: 18.0
  south: -34.5
  east: 19.5
  north: -33.0
tags: [osm, amenities, poi, openstreetmap, overpass]
notes: >
  Redistribution requires share-alike for any derived databases under ODbL 1.0.
  Attribution required: © OpenStreetMap contributors.
  Overpass query example:
    [out:json][bbox:-34.5,18.0,-33.0,19.5];
    node[amenity];
    out body;
  Cache TTL is 24h per docs/DATA_LIFECYCLE.md §2.
  Mock fallback: public/mock/amenities.geojson with representative Cape Town POIs.

id: EXP-002
name: Land-Use Change Detection
version: "1.0.0"
status: PROPOSED
created: "2026-03-09"
phase: E

hypothesis: >
  Sentinel-2 L2A time-series imagery (2020–2024) can classify 6 CoCT Integrated Zoning
  Scheme (IZS) land-use categories at >= 85% F1-macro using a U-Net architecture with
  ResNet-34 encoder.

description: >
  Multi-class semantic segmentation of land-use change using multi-temporal Sentinel-2
  data labelled with CoCT IZS zoning codes. Baseline is a random forest on spectral
  band statistics. Primary deliverable is a validated model artifact suitable for
  periodic re-inference as new Sentinel-2 scenes arrive.

bounding_box:
  west: 18.0
  south: -34.5
  east: 19.5
  north: -33.0
  crs: EPSG:4326

datasets:
  - id: sentinel-2-l2a
    name: Sentinel-2 L2A 2020-2024 (Copernicus)
    role: input imagery
    bands: [B2, B3, B4, B8, B11, B12]
    temporal_range: "2020-01-01/2024-12-31"
    resolution_m: 10
    license: Copernicus Open Data
  - id: ds-002
    name: CoCT IZS Zoning 2022
    role: class labels
    classes:
      - Single Residential
      - General Residential
      - Commercial
      - Industrial
      - Open Space / Conservation
      - Agricultural
    split:
      strategy: spatial_block_cv
      block_size_km: 5
      n_folds: 5

model:
  type: semantic_segmentation
  architecture: UNet
  encoder: resnet34
  pretrained: imagenet
  libraries:
    - segmentation-models-pytorch>=0.3
    - torch>=2.0
    - torchvision>=0.15
    - rasterio>=1.3
    - geopandas>=0.14

training_config:
  seed: 42
  epochs: 50
  batch_size: 8
  learning_rate: 0.0001
  optimizer: AdamW
  lr_scheduler: CosineAnnealingLR
  loss: DiceCELoss
  augmentations:
    - RandomHorizontalFlip
    - RandomVerticalFlip
    - RandomRotation90
    - ColorJitter(brightness=0.1, contrast=0.1)
  early_stopping:
    patience: 10
    metric: val_f1_macro
    min_delta: 0.001
  baseline:
    model: RandomForestClassifier
    features: [band_mean, band_std, ndvi, ndbi]

compute:
  cpu: 4
  gpu: 1
  gpu_memory_gb: 8
  memory_gb: 16
  estimated_duration: "4 hours (GPU)"
  container: "capegis-research:gpu"

metrics:
  primary:
    - name: f1_macro
      threshold: 0.85
      direction: higher_is_better
  secondary:
    - name: per_class_f1
      direction: higher_is_better
    - name: spatial_confusion_matrix
    - name: iou_macro
      threshold: 0.75
      direction: higher_is_better

statistical_tests:
  - McNemar test (U-Net vs baseline RF)
  confidence_intervals: 95%
  spatial_cv: 5-fold block CV (5 km × 5 km)

checkpoints:
  save_policy: every_10_epochs_and_best
  artifact_registry: artifacts/EXP-002/
  artifacts:
    - checkpoints/best_model.pth
    - results/predictions.tif
    - results/metrics_summary.json
    - results/spatial_confusion_matrix.csv
    - notebooks/EXP-002-analysis.ipynb

provenance:
  code_commit: TBD
  environment_hash: TBD
  dataset_versions:
    sentinel-2-l2a: "2020-2024"
    ds-002: "2022"

popia:
  sensitive: false
  pii_fields: []
  pre_processing_required: none

teardown:
  cleanup_tmp: true
  delete_intermediate_rasters: true
  estimated_cost_usd: 2.50

decision_gate: >
  If F1-macro < 0.75 at epoch 20, switch to ConvMixer or XGBoost on hand-crafted
  spectral indices. Document decision in experiment log.

# CapeTown GIS Hub — Terraform Infrastructure CI/CD
# Plans on every PR touching infra/**, applies on merge to main.
# Uses Workload Identity Federation (keyless) — no JSON key files.
# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   GCP_PROJECT_ID          — GCP project ID (e.g. capegis-prod-12345)
#   GCP_WIF_PROVIDER        — Workload Identity Federation provider
#                              (projects/123/locations/global/workloadIdentityPools/github/providers/github)
#   GCP_WIF_SERVICE_ACCOUNT — SA email (terraform@capegis-prod.iam.gserviceaccount.com)
#
# Alternative (if not using WIF):
#   GCP_SA_KEY              — base64-encoded service account JSON key
# ─────────────────────────────────────────────────────────────────────────────
name: Terraform

on:
  push:
    branches: [ main ]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false # never cancel an apply mid-flight

permissions:
  contents: read
  pull-requests: write   # post plan output as PR comment
  id-token: write         # required for GCP Workload Identity Federation

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_WORKING_DIR: infra/gcp

jobs:
  # ── Terraform Format Check ──
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~> 1.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff
        working-directory: infra

  # ── Terraform Plan (runs on every PR and push) ──
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: fmt
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~> 1.5"

      # Keyless auth via Workload Identity Federation (preferred)
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -input=false -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      # Post plan as a PR comment for review
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const body = `### 🏗️ Terraform Plan — \`infra/gcp\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ── Terraform Apply (only on main, only when plan detects changes) ──
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production # requires environment protection rules in GitHub
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~> 1.5"

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
        working-directory: ${{ env.TF_WORKING_DIR }}

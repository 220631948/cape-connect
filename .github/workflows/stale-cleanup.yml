# CapeTown GIS Hub — Stale Branch & Issue Cleanup
# Automated hygiene: closes stale issues/PRs and deletes merged branches.
# Runs weekly on schedule. Zero overlap with existing CI/security workflows.
# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets: none (uses default GITHUB_TOKEN)
# ─────────────────────────────────────────────────────────────────────────────
name: Stale Cleanup

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Stale Issues & PRs ──
  stale:
    name: Label & Close Stale Issues/PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: >
            ⏳ This issue has been automatically marked as **stale** because it
            has not had recent activity. It will be closed in 14 days if no
            further activity occurs. Remove the `stale` label to keep it open.
          stale-pr-message: >
            ⏳ This PR has been automatically marked as **stale** because it
            has not had recent activity. It will be closed in 7 days if no
            further activity occurs.
          close-issue-message: >
            🗑️ This issue was closed because it has been stale for 14 days.
            Feel free to reopen if still relevant.
          close-pr-message: >
            🗑️ This PR was closed because it has been stale for 7 days.
            Feel free to reopen if still relevant.
          days-before-stale: 60
          days-before-close: 14
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security,work-in-progress"
          operations-per-run: 60

  # ── Delete Merged Branches ──
  prune-branches:
    name: Delete Merged Branches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Delete merged remote branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Finding merged branches..."
          PROTECTED="main|develop|staging|production|release"

          git branch -r --merged origin/main \
            | grep -v "origin/main" \
            | grep -v -E "origin/($PROTECTED)" \
            | sed 's|origin/||' \
            | while read -r branch; do
                echo "🗑️  Deleting merged branch: $branch"
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$branch" 2>/dev/null || true
              done

          echo "✅ Merged branch cleanup complete"
